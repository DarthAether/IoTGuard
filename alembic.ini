[alembic]
# Path to migration environment
script_location = src/iotguard/db/migrations

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Truncate long revision to 12 characters
truncate_slug_length = 40

# Set to true to run in "offline" mode
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# the output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# SQLAlchemy URL -- overridden at runtime via env.py but needed as a fallback
sqlalchemy.url = postgresql+psycopg2://iotguard:iotguard@localhost:5432/iotguard


[post_write_hooks]
# Run ruff format on newly generated migration files
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
