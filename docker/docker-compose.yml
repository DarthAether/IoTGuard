###############################################################################
# IoTGuard -- local development / CI compose stack
###############################################################################

services:
  # ---- Application ---------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      API_DEBUG: "true"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: "${POSTGRES_USER:-iotguard}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-iotguard}"
      DB_NAME: "${POSTGRES_DB:-iotguard}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      MQTT_USERNAME: "${MQTT_USERNAME:-}"
      MQTT_PASSWORD: "${MQTT_PASSWORD:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production}"
      OBSERVABILITY_PROMETHEUS_ENABLED: "true"
      OBSERVABILITY_LOG_FORMAT: "json"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- PostgreSQL ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-iotguard}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-iotguard}"
      POSTGRES_DB: "${POSTGRES_DB:-iotguard}"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iotguard}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Redis ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Mosquitto (MQTT broker) ---------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquittodata:/mosquitto/data
      - mosquittolog:/mosquitto/log
    restart: unless-stopped

  # ---- Prometheus ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ---- Grafana -------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  mosquittodata:
  mosquittolog:
  prometheusdata:
  grafanadata:
